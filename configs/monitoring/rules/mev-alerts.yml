# MEV Prometheus Alert Rules
# Per MEV_MONITORING_OBSERVABILITY_2026.md SLO/health alerts
# Inhibition: MEVBoostDown suppresses MEVBoostHighLatencyP99, MEVBoostProposalSuccessLow (configs/alertmanager/alertmanager.yml)
#
groups:
  # Node resource pressure (swap/memory) - node_exporter metrics
  # Standard names: node_memory_SwapTotal_bytes, node_memory_SwapFree_bytes, node_memory_MemAvailable_bytes
  - name: Node Resource Alerts
    rules:
      - alert: HighSwapUsage
        expr: |
          (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes)
            > (node_memory_SwapTotal_bytes * 0.5)
          and node_memory_SwapTotal_bytes > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Swap usage above 50%"
          description: "Swap usage has exceeded 50% for 10 minutes. Memory pressure may impact node sync and MEV performance."

      - alert: LowAvailableMemory
        expr: node_memory_MemAvailable_bytes < 2e9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Available memory below 2GB"
          description: "Available memory has been below 2GB for 10 minutes. Risk of OOM and sync degradation."

      # DISK ALERT: node_exporter node_filesystem_* metrics (scrape at 9100)
      - alert: LowDiskSpaceCritical
        expr: |
          (node_filesystem_avail_bytes{mountpoint=~"^/$|^/data.*"} / node_filesystem_size_bytes{mountpoint=~"^/$|^/data.*"}) < 0.05
          and node_filesystem_size_bytes{mountpoint=~"^/$|^/data.*"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 5% on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} has less than 5% free ({{ $value | humanizePercentage }}) for 5 minutes. Risk of node failure."
          runbook_url: "https://github.com/LYFTIUM-INC/nodes/blob/main/docs/runbooks/MONITORING_CHECKS.md#disk"

      - alert: LowDiskSpaceWarning
        expr: |
          (node_filesystem_avail_bytes{mountpoint=~"^/$|^/data.*"} / node_filesystem_size_bytes{mountpoint=~"^/$|^/data.*"}) < 0.10
          and node_filesystem_size_bytes{mountpoint=~"^/$|^/data.*"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space below 10% on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} has less than 10% free ({{ $value | humanizePercentage }}) for 5 minutes."
          runbook_url: "https://github.com/LYFTIUM-INC/nodes/blob/main/docs/runbooks/MONITORING_CHECKS.md#disk"

  # P1 Critical: Restart loop and EL-CL disconnect (per BLOCKCHAIN_NODE_MANAGEMENT_BEST_PRACTICES_MEV_2026)
  - name: MEV Node Critical Alerts
    rules:
      - alert: ServiceRestartLoop
        expr: systemd_service_starts_5m > 3
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} in restart loop"
          description: "{{ $labels.service }} has started more than 3 times in 5 minutes. Check journalctl -u {{ $labels.service }}.service -n 50"

      - alert: ErigonConsensusLayerDisconnected
        expr: erigon_cl_requests_absent > 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Erigon not receiving consensus layer requests"
          description: "Erigon has logged 'no CL requests to engine-api' in the last 30 minutes. Lighthouse may be down or disconnected. MEV block production will fail."

  - name: MEV Foundation Infrastructure Alerts
    rules:
      # MEV-Boost alerts
      - alert: MEVBoostDown
        expr: max(up{job=~"mev-boost.*"}) == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MEV-Boost is down"
          description: "MEV-Boost has been down for more than 1 minute. Block proposals will fail."
          runbook_url: "https://github.com/LYFTIUM-INC/nodes/blob/main/docs/runbooks/MONITORING_CHECKS.md#mev-boost"

      # v1.12 uses mev_boost_relay_latency_* (avg = sum/count in seconds)
      - alert: MEVBoostHighLatency
        expr: |
          (
            sum(rate(mev_boost_relay_latency_sum{job=~"mev-boost.*"}[5m]))
            / (sum(rate(mev_boost_relay_latency_count{job=~"mev-boost.*"}[5m])) + 1e-9)
          ) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MEV-Boost avg relay latency > 500ms"
          description: "MEV-Boost average relay latency is above 500ms over 5m"
          runbook_url: "https://github.com/LYFTIUM-INC/nodes/blob/main/docs/runbooks/MONITORING_CHECKS.md#mev-boost"

      # SLO: getHeader p99 < 1s (MEV_MONITORING_OBSERVABILITY_2026.md §5.2)
      # Inhibited by MEVBoostDown when service is down
      - alert: MEVBoostHighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum by (le, relay) (rate(mev_boost_relay_latency_bucket{job=~"mev-boost.*"}[5m]))
          ) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MEV-Boost relay p99 latency > 1s"
          description: "MEV-Boost relay p99 latency exceeds 1 second for {{ $labels.relay }} (SLO: getHeader p99 <1s)"
          runbook_url: "https://github.com/LYFTIUM-INC/nodes/blob/main/docs/runbooks/MONITORING_CHECKS.md#mev-boost"

      # SLO: proposal success ≥95% (MEV_MONITORING_OBSERVABILITY_2026.md §5.2)
      # Inhibited by MEVBoostDown when service is down
      - alert: MEVBoostProposalSuccessLow
        expr: |
          (
            sum(rate(mev_boost_relay_status_code_total{job=~"mev-boost.*",http_status_code=~"2.."}[1h]))
            / (sum(rate(mev_boost_relay_status_code_total{job=~"mev-boost.*"}[1h])) + 1e-9)
          ) < 0.95
          and sum(rate(mev_boost_relay_status_code_total{job=~"mev-boost.*"}[1h])) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "MEV-Boost proposal success rate below 95%"
          description: "MEV-Boost getPayload success rate is below 95% over the last hour. Check relay connectivity and timing."
          runbook_url: "https://github.com/LYFTIUM-INC/nodes/blob/main/docs/runbooks/MONITORING_CHECKS.md#mev-boost"

      # RBuilder alerts
      - alert: RBuilderDown
        expr: up{job="rbuilder-foundation"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RBuilder is down"
          description: "RBuilder has been down for more than 1 minute"

      - alert: RBuilderLowProfitMargin
        expr: rbuilder_profit_margin_eth < 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RBuilder low profit margin"
          description: "RBuilder profit margin is below 0.01 ETH"

      # Bundle Router alerts
      - alert: BundleRouterDown
        expr: up{job="bundle-router-foundation"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Bundle Router is down"
          description: "Bundle Router has been down for more than 1 minute"

      - alert: BundleRouterHighFailureRate
        expr: bundle_router_failure_rate > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Bundle Router high failure rate"
          description: "Bundle Router failure rate is above 10%"

      # Ethereum node alerts
      - alert: EthereumNodeDown
        expr: max(up{job=~"erigon|ethereum-node|reth"}) == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Ethereum execution node is down"
          description: "Execution layer (Erigon/Geth/Reth) has been down for more than 1 minute. EL unavailable."

      - alert: EthereumNodeHighLatency
        expr: eth_block_processing_time_seconds > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Ethereum node high latency"
          description: "Ethereum block processing time is above 100ms"