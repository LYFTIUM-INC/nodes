# version attribute obsolete in Compose V2 - removed to avoid warning
networks:
  mev_foundation_network:
    external: true

services:
  # MEV-Boost - Builder API with properly formatted relay URL
  mev-boost:
    image: flashbots/mev-boost:latest
    container_name: mev-boost-foundation
    restart: unless-stopped
    ports:
      - "28550:18550"   # Builder API
      - "18551:18551"   # Metrics
    volumes:
      - ./configs/mev-boost:/configs
      - /data/mev/data:/data
      - /data/blockchain/nodes/jwt-secret-common.hex:/data/jwt-secret.hex:ro
    environment:
      - LOG_LEVEL=info
      - JSON_LOGS=true
    command:
      - mev-boost
      - --mainnet
      - --addr
      - "0.0.0.0:18550"
      - --metrics-addr
      - "0.0.0.0:18551"
      - --relay
      - "https://0xa1559ace749633b997cb3fdacffb890aeebdb0f5a3b6aaa7eeeaf1a38af0a8fe88b9e4b1f61f236d2e64d95733327a62@relay.ultrasound.money"
      - --relay
      - "https://0x8c4ed5e24fe5c6ae21018437bde147693f68cda427cd1122cf20819c30eda7ed74f72dece09bb313f2a1855595ab677d@titanrelay.xyz"
      - --relay
      - "https://0x8b5d2e73e2a3a55c6c87b8b6eb92e0149a125c852751db1422fa951e42a09b82c142c3ea98d0d9930b056a3bc9896b8f@bloxroute.max-profit.blxrbdn.com"
      - --relay
      - "https://0xb0b07cd0abef743db4260b0ed50619cf6ad4d82064cb4fbec9d3ec530f7c5e6793d9f286c4e082c0244ffb9f2658fe88@bloxroute.regulated.blxrbdn.com"
      - --relay
      - "https://0xa15b52576bcbf1072f4a011c0f99f9fb6c66f3e1ff321f11f461d15e31b1cb359caa092c71bbded0bae5b5ea401aab7e@aestus.live"
      - --relay
      - "https://0xac6e77dfe25ecd6110b8e780608cce0dab71fdd5ebea22a16c0205200f2f8e2e3ad3b71d3499c54ad14d6c21b41a37ae@boost-relay.flashbots.net"
      - --relay
      - "https://0xa7ab7a996c8584251c8f925da3170bdfd6ebc75d50f5ddc4050a6fdc77f2a3b5fce2cc750d0865e05d7228af97d69561@agnostic-relay.net"
      - --relay
      - "https://0x88ef3061f598101ca713d556cf757763d9be93d33c3092d3ab6334a36855b6b4a4020528dd533a62d25ea6648251e62e@relay.ethgas.com"
      - --relay
      - "https://0xb3ee7afcf27f1f1259ac1787876318c6584ee353097a50ed84f51a1f21a323b3736f271a895c7ce918c038e4265918be@relay.edennetwork.io"
      - --relay
      - "https://0x98650451ba02064f7b000f5768cf0cf4d4e492317d82871bdc87ef841a0743f69f0f1eea11168503240ac35d101c9135@mainnet-relay.securerpc.com"
    networks:
      - mev_foundation_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18550"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # RBuilder - Optional MEV builder
  rbuilder:
    image: node:18-alpine
    container_name: rbuilder-foundation
    restart: unless-stopped
    ports:
      - "18552:3000"   # RBuilder API
      - "6065:6065"     # Metrics
    volumes:
      - /data/blockchain/nodes/jwt-secret-common.hex:/data/jwt-secret.hex:ro
    working_dir: /app
    command: ["sh", "-c", "npm install && npm start"]
    networks:
      - mev_foundation_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-mev-foundation
    restart: unless-stopped
    ports:
      - "19091:9090"
    volumes:
      - /data/blockchain/nodes/configs/monitoring/prometheus-foundation.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-foundation-data:/prometheus/data
    command: >
      --config.file=/etc/prometheus/prometheus.yml
      --storage.tsdb.path=/prometheus/data
      --web.enable-lifecycle
    networks:
      - mev_foundation_network

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-mev-foundation
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - /data/blockchain/nodes/configs/grafana:/etc/grafana
      - /data/blockchain/nodes/data/grafana-foundation:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=mev_foundation_2025
      - GF_PATHS_CONFIG=/etc/grafana/grafana.ini
    networks:
      - mev_foundation_network
    depends_on:
      - prometheus

volumes:
  prometheus-foundation-data:
    driver: local
  grafana-foundation-data:
    driver: local
