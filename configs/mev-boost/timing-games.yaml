# MEV-Boost Timing Games Configuration
# Per MEV_OPTIMIZATION_PROPOSALS_2026.md and docs/timing-games.md
#
# Used by mev-boost v1.12+ via -config. Relays defined here (v1.12 rejects CLI+config duplicates).
#
# Expected impact: +2-5% revenue from capturing late, higher-value bids before proposal deadline.
# Flashbots timing games: delay first request + send multiple follow-ups to capture late bids.
#
# Proposed structure (verify against mev-boost config.example.yaml / timing-games.md):
# - enable_timing_games: delay first getHeader request
# - target_first_request_ms: when to send first request (default ~200ms into slot)
# - frequency_get_header_ms: interval between follow-up getHeader requests (default ~100ms)
#
# Reference: https://github.com/flashbots/mev-boost/blob/develop/docs/timing-games.md

# Timeouts (match systemd values)
timeout_get_header_ms: 4950
late_in_slot_time_ms: 2000

# Timing games - capture late bids
# When enabled: first getHeader delayed; multiple follow-ups sent
enable_timing_games: true
target_first_request_ms: 200
frequency_get_header_ms: 100

