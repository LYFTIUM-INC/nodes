# Consensus client recovery
consensus_clients:
  lighthouse:
    service_name: "lighthouse-beacon"
    rpc_url: "http://localhost:5052"
    restart_command: "systemctl restart lighthouse-beacon"
    resync_command: "rm -rf /data/blockchain/nodes/lighthouse/beacon && systemctl restart lighthouse-beacon"
    
  prysm:
    service_name: "prysm-beacon"
    rpc_url: "http://localhost:3500"
    restart_command: "systemctl restart prysm-beacon"

# Recovery timeouts and thresholds
recovery_settings:
  # Maximum time to wait for recovery actions
  timeouts:
    service_restart: 120  # seconds
    container_restart: 180
    sync_resume: 1800  # 30 minutes
    peer_connection: 300  # 5 minutes
    
  # Health check intervals during recovery
  health_check_interval: 30  # seconds
  max_recovery_attempts: 3
  
  # Escalation procedures
  escalation:
    # If basic recovery fails, try these
    advanced_recovery:
      - "full_resync"
      - "restore_from_backup"
      - "emergency_bootstrap"
    
    # Final escalation - manual intervention required
    manual_intervention_triggers:
      - "database_corruption"
      - "hardware_failure"
      - "network_partition"

# Emergency contacts and procedures
emergency:
  enabled: true
  
  # Contact information for escalation
  contacts:
    primary_oncall: "devops-oncall@company.com"
    blockchain_team: "blockchain-team@company.com"
    infrastructure_team: "infra-team@company.com"
  
  # Emergency shutdown procedures
  emergency_shutdown:
    enabled: true
    # Stop all non-critical services to preserve resources
    preserve_chains: ["ethereum", "arbitrum"]  # Critical chains to keep running
    
  # Emergency recovery procedures
  emergency_recovery:
    # If all else fails, restore from snapshots
    snapshot_sources:
      ethereum: "gs://ethereum-snapshots/latest"
      arbitrum: "gs://arbitrum-snapshots/latest"
    
    # Emergency bootstrap nodes
    emergency_bootstrap:
      enabled: true
      bootstrap_script: "/data/blockchain/nodes/maintenance/scripts/emergency_bootstrap.sh"

# Recovery monitoring
monitoring:
  enabled: true
  
  # Send alerts during recovery
  alert_on_recovery_start: true
  alert_on_recovery_success: true
  alert_on_recovery_failure: true
  
  # Recovery metrics to track
  metrics:
    - "recovery_duration"
    - "recovery_success_rate"
    - "most_common_failures"
    - "time_to_recovery"
  
  # Dashboard integration
  dashboard_webhook: "http://localhost:3000/api/recovery-events"