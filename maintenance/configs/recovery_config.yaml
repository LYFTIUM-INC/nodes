# Node Recovery Configuration
# Defines recovery procedures and parameters for each blockchain node

chains:
  ethereum:
    rpc_url: "http://localhost:8545"
    service_name: "erigon"
    container_name: "ethereum-node"
    min_peers: 10
    database_path: "/data/blockchain/nodes/ethereum/primary/erigon"
    peer_cache_path: "/data/blockchain/nodes/ethereum/primary/erigon/nodes.json"
    
    # Recovery commands
    add_peers_command: "curl -X POST -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"admin_addPeer\",\"params\":[\"enode://BOOTSTRAP_NODE\"],\"id\":1}' http://localhost:8545"
    fast_sync_command: "systemctl restart erigon"
    reset_network_command: "rm -f /data/blockchain/nodes/ethereum/primary/erigon/nodes.json"
    restore_command: "/data/blockchain/nodes/maintenance/scripts/backup_manager.py restore ethereum"
    resync_command: "rm -rf /data/blockchain/nodes/ethereum/primary/erigon/chaindata && systemctl restart erigon"
    docker_run_command: "docker run -d --name ethereum-node --restart unless-stopped -p 8545:8545 -v /data/blockchain/nodes/ethereum:/data ethereum/client-go"
    memory_limit: "16G"
    
