# CONFIGURATION DOCKER COMPOSE - PRODUCTION MEV OPTIMISÉE
# Fichier principal consolidé avec images officielles
# Date: 8 Janvier 2025 - Après nettoyage et correction

# -----------------------------------------------------------------------------
# Common security options (YAML anchor) applied to all containers
#   • no-new-privileges prevents privilege escalation inside containers
# -----------------------------------------------------------------------------
x-common-security: &common-security
  security_opt:
    - no-new-privileges:true

services:
  # Host-based Ethereum (Erigon) - the containerized erigon service has been removed.
  # All services can reach the host instance via the extra_hosts mapping "ethereum-erigon:host-gateway".

  # Arbitrum - Port 8549/8550 (STABLE: Nitro officiel)
  arbitrum-node:
    <<: *common-security
    image: offchainlabs/nitro-node:v3.6.8-d6c96a5
    container_name: arbitrum-node
    ports:
      - "8565:8549" # HTTP RPC - nouveau port
      - "8566:8550" # WebSocket - nouveau port
    volumes:
      - /data/blockchain/storage/arbitrum:/var/lib/arbitrum
    environment:
      - ARBITRUM_L1_URL=http://ethereum-erigon:8545
      - ARBITRUM_L1_BEACON=https://ethereum-beacon-api.publicnode.com
      - ARBITRUM_CHAIN_ID=42161
      - ARBITRUM_HTTP_API=eth,net,web3,debug,trace,txpool
    command: [
        "--parent-chain.connection.url=http://ethereum-erigon:8545",
        "--parent-chain.blob-client.beacon-url=https://ethereum-beacon-api.publicnode.com",
        # "--l2.chain-id=42161",  # deprecated flag removed
        "--http.addr=0.0.0.0",
        "--http.port=8549",
        "--http.api=eth,net,web3,arb",
        "--ws.addr=0.0.0.0",
        "--ws.port=8550",
      ]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    mem_swappiness: 30
    oom_score_adj: -300
    restart: unless-stopped
    extra_hosts:
      - "ethereum-erigon:host-gateway"
    networks:
      - mev_production_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8549"]
      interval: 180s
      timeout: 20s
      retries: 2
      start_period: 300s

  # Optimism - Port 8551/8552 (OFFICIEL: OP Labs)
  optimism-node:
    <<: *common-security
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:latest
    container_name: optimism-node
    ports:
      - "8751:8551" # HTTP RPC
      - "8752:8552" # WebSocket
    volumes:
      - /data/blockchain/storage/optimism:/var/lib/optimism
      - /data/blockchain/storage/optimism/jwt.txt:/jwt/jwt.txt:ro
    environment:
      - OP_NODE_L1_ETH_RPC=http://ethereum-erigon:8545
      - OP_NODE_L1_BEACON=https://ethereum-beacon-api.publicnode.com
      - OP_NODE_NETWORK=op-mainnet
      - OP_NODE_HTTP_ADDR=0.0.0.0
      - OP_NODE_HTTP_PORT=8551
      - OP_NODE_LOG_LEVEL=warn
    command:
      [
        "op-node",
        "--l1=http://ethereum-erigon:8545",
        "--l1.beacon=https://ethereum-beacon-api.publicnode.com",
        "--l2=http://optimism-geth:8545",
        "--rpc.addr=0.0.0.0",
        "--rpc.port=8551",
        "--network=op-mainnet",
        "--log.level=warn",
        "--l2.jwt-secret=/jwt/jwt.txt",
      ]
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 2G
    restart: unless-stopped
    extra_hosts:
      - "ethereum-erigon:host-gateway"
    networks:
      - mev_production_network

  # Optimism Geth (Exécution Layer pour Optimism)
  optimism-geth:
    <<: *common-security
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:v1.101315.2
    container_name: optimism-geth
    ports:
      - "8563:8545" # Résolution conflit avec Ethereum - nouveau port
      - "8564:8546" # WebSocket Optimism Geth - nouveau port
    volumes:
      - /data/blockchain/storage/optimism-geth:/var/lib/optimism
      - /data/blockchain/storage/optimism/jwt.txt:/jwt/jwt.txt:ro
    command:
      [
        "--http",
        "--http.addr=0.0.0.0",
        "--http.port=8545",
        "--http.api=eth,net,web3,debug,trace,txpool",
        "--ws",
        "--ws.addr=0.0.0.0",
        "--ws.port=8546",
        "--ws.api=eth,net,web3,debug,trace,txpool",
        "--datadir=/var/lib/optimism",
        "--authrpc.jwtsecret=/jwt/jwt.txt",
        "--cache=1024",
        "--maxpeers=50",
      ]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - mev_production_network

  # Polygon - Port 8553/8554 (OFFICIEL: Polygon)
  polygon-bor:
    <<: *common-security
    image: 0xpolygon/bor:1.4.0
    container_name: polygon-bor
    ports:
      - "9553:8545" # HTTP RPC (avoid host conflict)
      - "9554:8546" # WebSocket
      - "31304:30303" # P2P
    volumes:
      - /data/blockchain/storage/polygon:/var/lib/bor
    command:
      [
        "server",
        "--datadir=/var/lib/bor",
        "--port=30303",
        "--http",
        "--http.addr=0.0.0.0",
        "--http.port=8545",
        "--http.vhosts=*",
        "--http.corsdomain=*",
        "--http.api=eth,net,web3,debug,trace,txpool",
        "--ws",
        "--ws.addr=0.0.0.0",
        "--ws.port=8546",
        "--ws.api=eth,net,web3,debug,trace,txpool",
        "--txpool.nolocals",
        "--txpool.pricelimit=1000000000",
        "--cache=1024",
        "--maxpeers=50",
      ]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - mev_production_network

  # Avalanche - Port 9650/9651 (OFFICIEL: AvalancheGo)
  avalanche-node:
    <<: *common-security
    image: avaplatform/avalanchego:v1.11.11
    container_name: avalanche-node
    ports:
      - "9650:9650" # HTTP RPC
      - "9651:9651" # Staking
    volumes:
      - /data/blockchain/storage/avalanche:/root/.avalanchego
    command:
      [
        "/avalanchego/build/avalanchego",
        "--network-id=mainnet",
        "--http-host=0.0.0.0",
        "--http-port=9650",
        "--staking-port=9651",
        "--db-dir=/root/.avalanchego/db",
        "--log-level=warn",
      ]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - mev_production_network

  # BSC - Port 8575/8576 (OFFICIEL: Binance Smart Chain)
  bsc-node:
    <<: *common-security
    image: servercontainers/bsc:latest
    container_name: bsc-node
    ports:
      - "8575:8545" # HTTP RPC
      - "8576:8546" # WebSocket
      - "30306:30303" # P2P - nouveau port pour éviter conflit
    volumes:
      - /data/blockchain/storage/bsc:/data/bsc
    command:
      [
        "geth",
        "--datadir=/data/bsc",
        "--rpcaddr=0.0.0.0",
        "--rpcport=8545",
        "--rpcapi=eth,net,web3,debug,trace,txpool",
        "--ws",
        "--ws.addr=0.0.0.0",
        "--ws.port=8546",
        "--ws.api=eth,net,web3,debug,trace,txpool",
        "--maxpeers=50",
        "--cache=1024",
      ]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - mev_production_network

  # Solana - Port 8899/8900 (OFFICIEL: Solana Labs)
  solana-node:
    <<: *common-security
    image: solanalabs/solana:v1.18.25
    container_name: solana-node
    ports:
      - "8899:8899" # RPC
      - "8900:8900" # WebSocket
      - "8001:8001" # Gossip
    volumes:
      - /data/blockchain/storage/solana:/data/solana
    command:
      [
        "solana-validator",
        "--identity=/data/solana/identity.json",
        "--vote-account=/data/solana/vote-account.json",
        "--rpc-port=8899",
        "--rpc-bind-address=0.0.0.0",
        "--entrypoint=entrypoint.mainnet-beta.solana.com:8001",
        "--expected-genesis-hash=5eykt4UsFv8P8NJdTREpY1vzqKqZKvdpKuc147dw2N9d",
        "--wal-recovery-mode=skip_any_corrupted_record",
        "--limit-ledger-size",
      ]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - mev_production_network

  # MEV Relay (SIMPLE: Nginx proxy)
  mev-relay:
    <<: *common-security
    image: nginx:alpine
    container_name: mev-relay
    ports:
      - "9080:80"
    volumes:
      - ./mev/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "ethereum-erigon:host-gateway"
    networks:
      - mev_production_network
    restart: unless-stopped

  # System Monitoring (Prometheus)
  monitoring:
    <<: *common-security
    image: prom/prometheus:latest
    container_name: monitoring
    ports:
      - "19090:9090"
    volumes:
      - /data/blockchain/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /data/blockchain/monitoring:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "ethereum-erigon:host-gateway"
    networks:
      - mev_production_network
    restart: unless-stopped

  risk-manager:
    <<: *common-security
    image: alpine:latest
    container_name: risk-manager
    volumes:
      - /data/blockchain/logs:/logs
    command:
      [
        "sh",
        "-c",
        "while true; do echo 'RISK-MANAGER System check'; sleep 300; done",
      ]
    restart: unless-stopped
    networks:
      - mev_production_network

# =============================================================================
# CONFIGURATION VOLUMES GLOBAUX
# =============================================================================
volumes:
  ethereum_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/blockchain/storage/erigon

  arbitrum_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/blockchain/storage/arbitrum

  polygon_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/blockchain/storage/polygon

  optimism_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/blockchain/storage/optimism
# =============================================================================
# NOTES D'OPTIMISATION
# =============================================================================
# 1. Toutes les images sont officielles (pas de build custom)
# 2. Limites de ressources strictes pour 32GB RAM
# 3. Health checks optimisés pour réduire la charge
# 4. Logs configurés en niveau "warn" pour performance
# 5. Networking isolé avec subnet dédié
# 6. Persistence des données assurée
# 7. Services MEV simplifiés mais fonctionnels
# =============================================================================

# =============================================================================
# NETWORK
# =============================================================================
networks:
  mev_production_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
